<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>company.json</title>
  <meta
    name="description"
    content="An open proposal for publishing first-party organization information on the web."
  >
  <style>
    :root {
      color-scheme: light dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #f6f7f9;
      color: #17191d;
    }

    main {
      width: min(720px, 100%);
      padding: 56px;
      background: #ffffff;
      border: 1px solid #e1e4e8;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
    }

    code {
      font-size: 1em;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.5rem, 7vw, 4.75rem);
      letter-spacing: -0.055em;
      line-height: 1;
    }

    .status {
      display: inline-block;
      margin-bottom: 24px;
      padding: 6px 10px;
      border: 1px solid #cfd5dc;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 650;
      letter-spacing: 0.025em;
      text-transform: uppercase;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      font-size: clamp(1.18rem, 2.5vw, 1.55rem);
      line-height: 1.5;
      color: #41464d;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    a {
      color: inherit;
      font-weight: 650;
      text-underline-offset: 4px;
    }

    footer {
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid #e1e4e8;
      color: #656b73;
      font-size: 0.93rem;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #101215;
        color: #f2f4f7;
      }

      main {
        background: #181b20;
        border-color: #30343a;
        box-shadow: none;
      }

      .lead,
      footer {
        color: #b9c0c8;
      }

      .status,
      footer {
        border-color: #353a42;
      }
    }

    @media (max-width: 600px) {
      main {
        padding: 36px 26px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="status">Early draft</div>

    <h1><code>company.json</code></h1>

    <p class="lead">
      An open proposal for publishing first-party organization information
      on the web.
    </p>

    <nav aria-label="Project links">
      <a href="https://github.com/companyjson/spec">View on GitHub</a>
      <a href="mailto:hello@companyjson.org">Contact</a>
      <a href="mailto:feedback@companyjson.org">Send feedback</a>
    </nav>

    <footer>
      The specification, schema, examples, and discovery mechanism are under
      active development.
    </footer>
  </main>
</body>
</html>
